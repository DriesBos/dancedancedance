[build]
  command = "pnpm run build"
  publish = ".next"

[build.environment]
  NEXT_TELEMETRY_DISABLED = "1"

# Handle Next.js rewrites properly
[[redirects]]
  from = "/api/newsletter/subscribe"
  to = "/api/newsletter/subscribe"
  status = 200
  force = false
  [redirects.rate_limit]
    window_limit = 5
    window_size = 60
    aggregate_by = ["ip", "domain"]

# Security and compression headers for all pages
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    # Content-Security-Policy is enforced in src/proxy.ts so each response can nonce Next scripts.
